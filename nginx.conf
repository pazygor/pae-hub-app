# ─────────────────────────────────────────────────────────────────────────────
# nginx do front M1 PAE Hub
#  - serve o SPA React (fallback para index.html nas rotas do client-side)
#  - faz proxy de /api      → api:3001 (REST)
#  - faz proxy de /socket.io → api:3001 (WebSocket / Socket.IO)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploads/respostas podem ser grandes (evidências)
    client_max_body_size 25m;

    # ─── API REST ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket (Socket.IO) ───────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://api:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ─── SPA (client-side routing) ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
